# Defines the whole DraftPilot stack so `docker compose up` runs everything together.

services:
  # --- PostgreSQL database (official image, no Dockerfile of ours) ---
  db:
    image: postgres:16
    environment:
      # Values come from the gitignored root .env (no credentials in committed files).
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    # Lets other services wait until Postgres is actually ready to accept connections.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- Redis cache (official image; wired now, used later) ---
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  # --- FastAPI backend (built from apps/api/Dockerfile) ---
  api:
    build: ./apps/api
    environment:
      # Built from the same env vars; host is `db` (the service name), not localhost.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Run migrations first, THEN start the server.
    command: sh -c "alembic upgrade head && uvicorn src.main:app --host 0.0.0.0 --port 8000"

  # --- Next.js frontend (built from apps/web/Dockerfile) ---
  web:
    build: ./apps/web
    environment:
      # The frontend reaches the backend by service name `api`, not localhost.
      API_BASE_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

# Named volume so the database's data survives container restarts.
volumes:
  dbdata:
